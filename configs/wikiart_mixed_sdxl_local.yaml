experiment:
  name: kmc_lora_wikiart_mixed_sdxl
  seed: 42

paths:
  dataset_dir: datasets\processed\wikiart_mixed
  artifacts_dir: kmc_lora\artifacts\wikiart_mixed
  results_dir: kmc_lora\results\robustness_sdxl_anchor\wikiart_mixed

model:
  base_model: models/sdxl_base_1.0
  use_fp16: true
  resolution: 1024
  train_batch_size: 1
  gradient_accumulation_steps: 4
  max_train_steps: 800
  save_steps: 200
  lora_rank: 16
  lora_alpha: 16
  lora_dropout: 0.05
  max_gpu_memory_fraction: 0.80

prompts:
  instance_prompt: "a painting in mixed art styles"
  validation_prompts:
    - "a painting of a sunset over mountains"
    - "a painting of a woman reading a book"
    - "a painting of a bustling city street"
    - "a painting of flowers in a vase"

curriculum:
  phase1_ratio: 0.4
  phase2_ratio: 0.35
  phase3_ratio: 0.25
  k_range: [3, 10]
  typicality_power: 1.0
  quality_weight: 0.5
  typicality_weight: 0.3
  heterogeneity_weight: 0.2

quality:
  use_aesthetics: false
  aesthetics_model_url: "https://github.com/LAION-AI/aesthetic-predictor/raw/main/sa_0_4_vit_l_14_linear.pth"

splits:
  d_high_ratio: 1.0
  d_medium_keep_percentile: 90
  d_low_largest_cluster: true
  sub_50: 50
  sub_25: 25
